<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Budget Planner</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen p-6 flex justify-center items-center">

<div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-8 space-y-6">

<h1 class="text-3xl font-bold text-center">💍 Wedding Budget Planner</h1>
<p class="text-center text-gray-500">Plan your wedding expenses in USD</p>

<div>
<label class="block font-semibold">Total Budget (USD)</label>
<input id="budget" type="number" class="w-full border rounded-xl p-3" placeholder="Enter total budget in USD">
</div>

<div>
<label class="block font-semibold">Venue Cost (USD)</label>
<input id="venue" type="number" class="w-full border rounded-xl p-3" placeholder="Venue cost">
</div>

<div>
<label class="block font-semibold">Catering Cost (USD)</label>
<input id="catering" type="number" class="w-full border rounded-xl p-3" placeholder="Catering cost">
</div>

<div>
<label class="block font-semibold">Photography Cost (USD)</label>
<input id="photo" type="number" class="w-full border rounded-xl p-3" placeholder="Photography cost">
</div>

<div class="pt-4">
<button onclick="calculate()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold p-4 rounded-2xl transition">Calculate Remaining Budget</button>
</div>

<div class="text-center text-xl font-semibold" id="result"></div>

</div>

<script>
function calculate(){
let budget = Number(document.getElementById('budget').value || 0);
let venue = Number(document.getElementById('venue').value || 0);
let catering = Number(document.getElementById('catering').value || 0);
let photo = Number(document.getElementById('photo').value || 0);

let totalExpense = venue + catering + photo;
let remaining = budget - totalExpense;

document.getElementById('result').innerText =
"Remaining Budget: " + remaining.toLocaleString('en-US', {style:'currency', currency:'USD'});
}
</script>

</body>
</html>
